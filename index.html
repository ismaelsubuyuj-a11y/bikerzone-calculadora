<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biker Zone</title>

<style>
body {
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    padding: 20px;
}

.container {
    max-width: 400px;
    margin: auto;
    background: #1c1c1c;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

img { width: 150px; }

input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}

button { background: gold; }

.whatsapp { background: #25D366; color: white; }
.pdf { background: #2196F3; color: white; }

.cuota { font-size: 24px; color: gold; }

/* 🧾 ESTILO TICKET */
@media print {
    body {
        background: white;
        color: black;
    }

    .container {
        box-shadow: none;
        border-radius: 0;
    }

    button, select, input {
        display: none;
    }

    img {
        width: 120px;
    }
}
</style>
</head>

<body>

<div class="container" id="ticket">
    <img src="logo.png">

    <h2>Calcula tu compra</h2>

    <input type="number" id="monto" placeholder="Monto (Q)">

    <select id="cuotas">
        <option value="2">2 cuotas</option>
        <option value="3">3 cuotas</option>
        <option value="6">6 cuotas</option>
        <option value="10">10 cuotas</option>
        <option value="12">12 cuotas</option>
        <option value="15">15 cuotas</option>
        <option value="18">18 cuotas</option>
        <option value="24">24 cuotas</option>
        <option value="36">36 cuotas</option>
        <option value="48">48 cuotas</option>
    </select>

    <button id="btnCalcular">Calcular</button>

    <div id="resultado" style="display:none;">
        <div class="cuota" id="cuota"></div>
        <div id="total"></div>
    </div>

    <button class="whatsapp" id="btnWhats" style="display:none;">
        WhatsApp
    </button>

    <button class="pdf" id="btnPDF" style="display:none;">
        Imprimir / PDF
    </button>
</div>

<script>
const recargos = {
    2:0.14,3:0.15,6:0.16,10:0.18,12:0.19,
    15:0.20,18:0.22,24:0.24,36:0.26,48:0.27
};

let mensaje = "";

// CALCULAR
document.getElementById("btnCalcular").addEventListener("click", function(){

    const monto = parseFloat(document.getElementById("monto").value);
    const cuotas = parseInt(document.getElementById("cuotas").value);

    if(isNaN(monto)){
        alert("Ingrese monto válido");
        return;
    }

    const total = monto + (monto * recargos[cuotas]);
    const cuota = total / cuotas;

    document.getElementById("resultado").style.display = "block";
    document.getElementById("btnWhats").style.display = "block";
    document.getElementById("btnPDF").style.display = "block";

    const textoCuota = cuotas + " cuotas de Q" + cuota.toFixed(2);
    const textoTotal = "Total: Q" + total.toFixed(2);

    document.getElementById("cuota").innerText = textoCuota;
    document.getElementById("total").innerText = textoTotal;

    mensaje = "Hola 👋\n" + textoCuota + "\n" + textoTotal + "\nBiker Zone 🏍️";
});

// WHATSAPP
document.getElementById("btnWhats").addEventListener("click", function(){
    window.open("https://wa.me/?text=" + encodeURIComponent(mensaje));
});

// PDF / IMPRIMIR
document.getElementById("btnPDF").addEventListener("click", function(){
    window.print();
});
</script>

</body>
</html>
