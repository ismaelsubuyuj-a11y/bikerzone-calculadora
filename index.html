<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biker Zone</title>

<style>
body {
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    padding: 20px;
}

.container {
    max-width: 400px;
    margin: auto;
    background: #1c1c1c;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

img { width: 150px; }

input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}

button { background: gold; }

.whatsapp { background: #25D366; color: white; }

.cuota { font-size: 26px; color: gold; }

.historial {
    margin-top: 20px;
    font-size: 14px;
    text-align: left;
}
</style>
</head>

<body>

<div class="container">
    <img src="logo.png">

    <h2>Calcula tu compra</h2>

    <input type="number" id="monto" placeholder="Monto (Q)">

    <select id="cuotas">
        <option value="2">2 cuotas</option>
        <option value="3">3 cuotas</option>
        <option value="6">6 cuotas</option>
        <option value="10">10 cuotas</option>
        <option value="12">12 cuotas</option>
        <option value="15">15 cuotas</option>
        <option value="18">18 cuotas</option>
        <option value="24">24 cuotas</option>
        <option value="36">36 cuotas</option>
        <option value="48">48 cuotas</option>
    </select>

    <button onclick="calcular()">Calcular</button>

    <div id="resultado" style="display:none;">
        <div class="cuota" id="cuota"></div>
        <div id="total"></div>
        <div id="desde"></div>
    </div>

    <button class="whatsapp" onclick="whatsapp()" id="btnW" style="display:none;">
        Enviar por WhatsApp
    </button>

    <div class="historial" id="historial"></div>
</div>

<script>
const recargos = {
    2:0.14,3:0.15,6:0.16,10:0.18,12:0.19,
    15:0.20,18:0.22,24:0.24,36:0.26,48:0.27
};

let mensaje = "";
let admin = false;

function Q(n){ return "Q"+n.toLocaleString("es-GT",{minimumFractionDigits:2}); }

function calcular(){
    let m = parseFloat(monto.value);
    let c = parseInt(cuotas.value);

    if(isNaN(m)) return alert("Ingrese monto");

    let total = m + (m * recargos[c]);
    let cuota = total / c;

    resultado.style.display="block";
    btnW.style.display="block";

    cuotaTexto = ${c} cuotas de ${Q(cuota)};
    cuota.innerText = cuotaTexto;
    totalTexto = Total: ${Q(total)};
    total.innerText = totalTexto;

    // Desde automático
    desde.innerText = Desde ${Q(cuota)} al mes;

    // Mensaje WhatsApp
    mensaje = Hola 👋\n\n💳 ${cuotaTexto}\n💰 ${totalTexto}\n\nBiker Zone 🏍️;

    guardarHistorial(cuotaTexto, totalTexto);

    if(admin){
        let recargoQ = m * recargos[c];
        resultado.innerHTML += <br>📊 Recargo: ${Q(recargoQ)};
    }
}

function whatsapp(){
    window.open("https://wa.me/?text="+encodeURIComponent(mensaje));
}

// HISTORIAL LOCAL
function guardarHistorial(cuota,total){
    let data = JSON.parse(localStorage.getItem("historial")||"[]");
    data.unshift(${cuota} | ${total});
    localStorage.setItem("historial",JSON.stringify(data));
    mostrarHistorial();
}

function mostrarHistorial(){
    let data = JSON.parse(localStorage.getItem("historial")||"[]");
    historial.innerHTML = "<b>Historial:</b><br>" + data.slice(0,5).join("<br>");
}
mostrarHistorial();

// MODO ADMIN OCULTO (doble toque logo)
document.querySelector("img").addEventListener("dblclick",()=>{
    let pass = prompt("Contraseña admin:");
    if(pass==="1234"){
        admin = true;
        alert("Modo admin activado");
    }
});
</script>

</body>
</html>
