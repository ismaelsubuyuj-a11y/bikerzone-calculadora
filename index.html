<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biker Zone Guatemala </title>

<style>
body {
    font-family: Boldonse;
    background:#0f0f0f;
    color:white;
    margin:0;
}

/* HEADER */
.header {
    text-align:center;
    padding:30px 20px 10px;
}

.header img {
    width:180px;
}

.frase {
    font-size:14px;
    color:white;
    margin-top:10px;
    font-style:italic;
}

/* CATÁLOGO */
.catalogo {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:15px;
}

.moto {
    background:#1c1c1c;
    border-radius:10px;
    cursor:pointer;
    overflow:hidden;
}

.moto img {
    width:100%;
    height:120px;
    object-fit:cover;
}

.moto p {
    margin:5px;
    font-size:14px;
    color:gold;
}

/* COTIZADOR */
.cotizador {
    background:#1c1c1c;
    margin:15px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(255,215,0,0.2);
}

input, select, button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:none;
}

#monto {
    text-align:center;
    font-size:18px;
}

button {
    background:gold;
    font-weight:bold;
}

.cuota {
    font-size:22px;
    color:gold;
    margin-top:15px;
}

/* MODAL */
#modalMoto {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    text-align:center;
    z-index:1000;
}

.mini {
    width:80px;
    margin:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- 🔥 HEADER -->
<div class="header">
    <img src="logo.png">
    <div class="frase">
        "No vendemos motos… entregamos libertad sobre ruedas 🏍️🔥"
    </div>
</div>

<!-- 🏍️ CATÁLOGO -->
<div class="catalogo">

<div class="moto" onclick="abrirMoto('MT07 2016',48000,'mt1.jpg','mt2.jpg','mt3.jpg')">
<img src="mt1.jpg">
<p>MT07 2016 - Q48,000</p>
</div>

<div class="moto" onclick="abrirMoto('MT07 2019',54500,'mt4.jpeg','mt5.jpeg','mt6.jpeg')">
<img src="mt4.jpeg">
<p>MT07 2019 - Q54,500</p>
</div>

<div class="moto" onclick="abrirMoto('Kawasaki EX400 2023',39500,'k1.jpeg','k2.jpeg','k3.jpeg')">
<img src="k1.jpeg">
<p>Kawasaki EX400 2023 - Q39,500</p>
</div>

<div class="moto" onclick="abrirMoto('Boxer BM150 2026',7949,'b1.jpeg','b2.jpeg','b3.jpeg')">
<img src="b1.jpeg">
<p>Boxer BM150 2026 - Q7,949</p>
</div>

</div>

<!-- 💰 COTIZADOR -->
<div class="cotizador">

<h2>COTIZADOR CUOTAS</h2>
<h6> Recuerda que el cotizador muestra las cuotas a pagar mensualmente con tarjeta de crédito</h6>

<input type="text" id="modelo" placeholder="Modelo" readonly>
<input type="number" id="monto" placeholder="Monto (Q)">

<select id="cuotas">
<option value="2">2 cuotas</option>
<option value="3">3 cuotas</option>
<option value="6">6 cuotas</option>
<option value="10">10 cuotas</option>
<option value="12">12 cuotas</option>
<option value="15">15 cuotas</option>
<option value="18">18 cuotas</option>
<option value="24">24 cuotas</option>
<option value="36">36 cuotas</option>
<option value="48">48 cuotas</option>
</select>

<button onclick="calcular()">Calcular</button>

<div id="resultado" style="display:none;">
<div class="cuota" id="cuota"></div>
<div id="total"></div>
</div>

</div>

<!-- 🖼️ MODAL -->
<div id="modalMoto">

<img id="imgPrincipal" width="90%" style="margin-top:40px;">

<br><br>

<img id="mini1" class="mini">
<img id="mini2" class="mini">
<img id="mini3" class="mini">

<br><br>

<button onclick="cerrarMoto()">Cerrar</button>

</div>

<script>
const recargos = {
2:0.14,3:0.15,6:0.16,10:0.18,12:0.19,
15:0.20,18:0.22,24:0.24,36:0.26,48:0.27
};

function abrirMoto(nombre, precio, img1, img2, img3){

document.getElementById("modalMoto").style.display="block";

imgPrincipal.src=img1;
mini1.src=img1;
mini2.src=img2;
mini3.src=img3;

mini1.onclick=()=>imgPrincipal.src=img1;
mini2.onclick=()=>imgPrincipal.src=img2;
mini3.onclick=()=>imgPrincipal.src=img3;

document.getElementById("modelo").value=nombre;
document.getElementById("monto").value=precio;
}

function cerrarMoto(){
document.getElementById("modalMoto").style.display="none";
}

function calcular(){
let monto=parseFloat(document.getElementById("monto").value);
let cuotas=parseInt(document.getElementById("cuotas").value);

if(isNaN(monto)){ alert("Ingrese monto"); return; }

let total=monto+(monto*recargos[cuotas]);
let cuota=total/cuotas;

document.getElementById("resultado").style.display="block";

document.getElementById("cuota").innerText =
cuotas+" cuotas de Q"+cuota.toFixed(2);

document.getElementById("total").innerText =
"Total: Q"+total.toFixed(2);
}
</script>

</body>
</html>
