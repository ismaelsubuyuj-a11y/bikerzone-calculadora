<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biker Zone</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    padding: 20px;
}

.container {
    max-width: 400px;
    margin: auto;
    background: #1c1c1c;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
}

img {
    width: 150px;
    margin-bottom: 10px;
}

input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

input, select {
    background: #2c2c2c;
    color: white;
}

button {
    background: gold;
    color: black;
    font-weight: bold;
}

.whatsapp {
    background: #25D366;
    color: white;
}

.cuota {
    font-size: 26px;
    font-weight: bold;
    color: gold;
}

.total {
    margin-top: 5px;
}

.historial {
    margin-top: 20px;
    font-size: 14px;
    text-align: left;
}
</style>
</head>

<body>

<div class="container">
    <img src="logo.png" alt="Logo">

    <h2>Calcula tu compra</h2>

    <input type="number" id="monto" placeholder="Ingrese el monto (Q)">

    <select id="cuotas">
        <option value="2">2 cuotas</option>
        <option value="3">3 cuotas</option>
        <option value="6">6 cuotas</option>
        <option value="10">10 cuotas</option>
        <option value="12">12 cuotas</option>
        <option value="15">15 cuotas</option>
        <option value="18">18 cuotas</option>
        <option value="24">24 cuotas</option>
        <option value="36">36 cuotas</option>
        <option value="48">48 cuotas</option>
    </select>

    <button onclick="calcular()">Calcular</button>

    <div id="resultado" style="display:none;">
        <div class="cuota" id="cuota"></div>
        <div class="total" id="total"></div>
        <div id="desde"></div>
    </div>

    <button class="whatsapp" onclick="enviarWhatsApp()" id="btnWhats" style="display:none;">
        Enviar por WhatsApp
    </button>

    <div class="historial" id="historial"></div>
</div>

<script>
const recargos = {
    2:0.14,3:0.15,6:0.16,10:0.18,12:0.19,
    15:0.20,18:0.22,24:0.24,36:0.26,48:0.27
};

let mensaje = "";
let admin = false;

function formatoQ(num){
    return "Q" + num.toLocaleString("es-GT",{minimumFractionDigits:2});
}

function calcular(){
    const monto = parseFloat(document.getElementById("monto").value);
    const cuotas = parseInt(document.getElementById("cuotas").value);

    if(isNaN(monto)){
        alert("Ingrese un monto válido");
        return;
    }

    const total = monto + (monto * recargos[cuotas]);
    const cuota = total / cuotas;

    document.getElementById("resultado").style.display = "block";
    document.getElementById("btnWhats").style.display = "block";

    const textoCuota = ${cuotas} cuotas de ${formatoQ(cuota)};
    const textoTotal = Total: ${formatoQ(total)};

    document.getElementById("cuota").innerText = textoCuota;
    document.getElementById("total").innerText = textoTotal;
    document.getElementById("desde").innerText = Desde ${formatoQ(cuota)} al mes;

    mensaje = Hola 👋\n\n💳 ${textoCuota}\n💰 ${textoTotal}\n\nBiker Zone 🏍️;

    guardarHistorial(textoCuota, textoTotal);

    if(admin){
        const recargoQ = monto * recargos[cuotas];
        document.getElementById("resultado").innerHTML += <br>📊 Recargo: ${formatoQ(recargoQ)};
    }
}

function enviarWhatsApp(){
    window.open("https://wa.me/?text=" + encodeURIComponent(mensaje));
}

function guardarHistorial(cuota, total){
    let data = JSON.parse(localStorage.getItem("historial") || "[]");
    data.unshift(${cuota} | ${total});
    localStorage.setItem("historial", JSON.stringify(data));
    mostrarHistorial();
}

function mostrarHistorial(){
    let data = JSON.parse(localStorage.getItem("historial") || "[]");
    document.getElementById("historial").innerHTML =
        "<b>Historial:</b><br>" + data.slice(0,5).join("<br>");
}

mostrarHistorial();

// Modo admin oculto
document.querySelector("img").addEventListener("dblclick", function(){
    const pass = prompt("Contraseña admin:");
    if(pass === "1234"){
        admin = true;
        alert("Modo admin activado");
    }
});
</script>

</body>
</html>
